id = "backend-quality"
description = "Backend quality, coverage, REST Docs, and OpenAPI artifact foundation."
aliases = ["backend-quality", "backend-quality-docs", "backend-quality-docs-foundation"]
slice_patterns = ["backend-quality", "quality-docs", "docs-foundation"]

[targets.backend]
prompt = "backend_execute.md"
allowed_scope = "apps/api/**, .codex/harness/**, .codex/hooks/**, .github/**"
forbidden_scope = "apps/web/**"
verification_commands = [
  "cd apps/api && ./gradlew backendQualityCheck",
  "git diff --check",
]

[safety]
allow_main_merge = false
allow_push = false
allow_open_api_call = false
allow_db_migration_run = false
