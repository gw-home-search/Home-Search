id = "coordinate-snapshot-import"
description = "Backend coordinate snapshot importer hardening for VWorld SHP inputs."
aliases = [
  "coordinate-snapshot-import",
  "coordinate-import",
  "coordinate-shp-import",
]
slice_patterns = ["coordinate", "coordinate-shp", "snapshot-import"]

[targets.backend]
prompt = "backend_execute.md"
allowed_scope = "apps/api/**"
forbidden_scope = "apps/web/**"
verification_commands = [
  "cd apps/api && ./gradlew backendQualityCheck",
  "git diff --check",
]

[safety]
allow_main_merge = false
allow_push = false
allow_open_api_call = false
allow_db_migration_run = false
