id = "map-ui-state"
description = "V1 map UI state and marker interaction work."
aliases = [
  "map-ui-state",
  "map-state",
  "ui-state",
  "kakao-map-marker-refresh-flow",
  "marker-rendering-nonblocking-error",
]
slice_patterns = ["map-ui", "ui-state", "map-state", "kakao-map", "marker-rendering", "marker-refresh"]

[targets.backend]
prompt = "backend_execute.md"
allowed_scope = "apps/api/**"
forbidden_scope = "apps/web/**"
verification_commands = ["cd apps/api && ./gradlew test"]

[targets.frontend]
prompt = "frontend_execute.md"
allowed_scope = "apps/web/**"
forbidden_scope = "apps/api/**"
verification_commands = ["cd apps/web && npm run test", "cd apps/web && npm run build"]

[safety]
allow_main_merge = false
allow_push = false
allow_open_api_call = false
allow_db_migration_run = false
