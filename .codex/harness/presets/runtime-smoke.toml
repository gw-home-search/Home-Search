id = "runtime-smoke"
description = "Local full-stack runtime smoke for PostGIS, API, and web integration."
aliases = [
  "runtime-smoke",
  "mvp-e2e-runtime-smoke",
  "e2e-runtime-smoke",
  "full-stack-smoke",
]
slice_patterns = ["runtime-smoke", "e2e-runtime", "mvp-e2e", "full-stack-smoke"]

[targets.backend]
prompt = "backend_runtime_execute.txt"
allowed_scope = "infra/**, scripts/**, apps/api/**"
forbidden_scope = "apps/web/**"
verification_commands = [
  "docker compose -f infra/docker-compose.local.yml config",
  "cd apps/api && ./gradlew backendQualityCheck",
  "git diff --check",
]

[targets.frontend]
prompt = "frontend_execute.md"
allowed_scope = "apps/web/**"
forbidden_scope = "apps/api/**"
verification_commands = [
  "cd apps/web && npm run test",
  "cd apps/web && npm run build",
  "git diff --check",
]

[safety]
allow_main_merge = false
allow_push = false
allow_open_api_call = false
allow_db_migration_run = false
