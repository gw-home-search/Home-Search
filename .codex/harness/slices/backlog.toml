[[slices]]
id = "raw-ingest-persistence-adapter"
title_ko = "Raw ingest persistence adapter"
pr_type = "Feat"
pr_title_ko = "원시 수집 저장 adapter 연결"
description_ko = "open-api-ingest-prep application port를 Flyway/JDBC persistence로 연결하기 전 V1 raw/normalized 저장 invariant를 repository seam에서 검증한다."
status = "done"
priority = 50
targets = "backend"
preset = "open-api-ingest-prep"
acceptance_criteria = [
  "raw ingest row가 normalized trade insert보다 먼저 저장되는 repository/service evidence를 남긴다.",
  "source + source_key dedupe가 중복 normalized trade를 막는다.",
  "source_key가 달라도 fallback identity가 같은 trade는 중복 normalized row를 만들지 않는다.",
  "failed match는 raw_trade_ingest.status와 failure_reason으로 queryable evidence를 남긴다.",
  "normalized trade의 operational relation은 complex_id이며 complex_pk, apt_seq, source, source_key는 audit/dedupe metadata로 보존한다.",
]
first_red_candidates = [
  "JdbcRawTradeIngestRepositoryTest에서 raw save id 반환과 MATCH_FAILED 조회가 repository seam 부재로 실패한다.",
  "JdbcNormalizedTradeRepositoryTest에서 동일 source/source_key와 fallback duplicate insert가 중복 row를 만들지 않는다는 테스트가 schema/repository 부재로 실패한다.",
  "OpenApiTradeIngestService persistence integration test에서 duplicate raw row가 DUPLICATE로 남는 테스트가 JDBC adapter 부재로 실패한다.",
]
verification_commands = [
  "cd apps/api && ./gradlew backendQualityCheck",
  "cd apps/api && ./gradlew javadoc",
  "git diff --check",
]
stop_conditions = [
  "V1 public API URL, request field, response field 변경이 필요하면 중단한다.",
  "JPA, Security, Batch, Mail, ranking 관련 의존성이 필요하면 중단한다.",
  "raw evidence를 unique 제약으로 손실시키는 schema 변경이 필요하면 중단한다.",
  "DB migration이 V2 ranking, trend, favorite, alarm, mail, recommendation table을 요구하면 중단한다.",
]
risk_notes = [
  "backend-only slice이므로 apps/web/**는 건드리지 않는다.",
  "adapter는 이번 slice에서 @Repository로 자동 등록하지 않고 다음 architecture slice에서 wiring을 결정한다.",
  "trade partition unique 한계 때문에 global source/source_key dedupe는 trade_source_key_registry에서 보장한다.",
]
