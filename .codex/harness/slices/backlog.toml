[[slices]]
id = "kakao-map-marker-refresh-flow"
title_ko = "Kakao map marker refresh flow"
description_ko = "지도 idle/zoom/filter 변화가 V1 marker API 호출과 marker rendering으로 이어지는 frontend 흐름을 안정화한다."
status = "done"
priority = 10
targets = "frontend"
preset = "map-ui-state"
acceptance_criteria = [
  "Kakao map idle 또는 zoom 변경 시 현재 bounds/level 기준으로 region 또는 complex marker 요청이 한 번의 최신 요청으로 수렴한다.",
  "level <= 4에서는 /api/v1/map/complexes, 그 외 zoom level에서는 /api/v1/map/regions contract를 유지한다.",
  "filter 변경 후 stale marker가 새 응답을 덮어쓰지 않는다.",
  "marker refresh 실패 시 지도 조작은 유지되고 사용자에게 non-blocking state만 노출된다.",
]
first_red_candidates = [
  "marker fetch adapter 단위 테스트에서 늦게 도착한 이전 응답이 최신 marker state를 덮어쓰는 실패를 먼저 만든다.",
  "map level별 endpoint 선택 테스트에서 V1 URL이 바뀌면 실패하게 한다.",
]
verification_commands = [
  "cd apps/web && npm run test",
  "cd apps/web && npm run build",
]
stop_conditions = [
  "V1 API URL, request field, response field 변경이 필요하면 중단한다.",
  "Kakao SDK 실호출이나 외부 네트워크 의존이 필요하면 mock/test seam으로 되돌린다.",
]
risk_notes = [
  "Kakao map 객체 lifecycle과 React state update 순서가 race condition을 만들 수 있다.",
  "frontend-only slice이므로 backend worktree를 만들지 않는다.",
]

[[slices]]
id = "kakao-map-runtime-visual-smoke"
title_ko = "Kakao map runtime visual smoke"
description_ko = "apps/web에서 실제 Kakao JS SDK 지도 surface를 띄우고 V1 marker fetch 연결을 브라우저로 확인할 수 있게 만든다."
status = "planned"
priority = 15
targets = "frontend"
preset = "map-ui-state"
acceptance_criteria = [
  "VITE_KAKAO_MAP_APP_KEY가 있을 때 Kakao JS SDK를 autoload=false로 로드하고 map surface를 ready 상태로 전환한다.",
  "Kakao map idle에서 SDK bounds와 level을 읽어 기존 /api/v1/map/complexes 또는 /api/v1/map/regions marker fetch로 연결한다.",
  "SDK key 누락 또는 SDK load 실패 시 map 영역은 남기고 non-blocking alert만 노출한다.",
  "region/complex marker 응답은 CustomOverlay로 렌더링하고 marker 변경 또는 unmount 때 overlay를 정리한다.",
]
first_red_candidates = [
  "fake Kakao SDK loader를 mock 했을 때 map surface가 ready가 되고 SDK bounds/level 기반으로 marker API fetch가 발생해야 한다.",
  "Kakao key가 없을 때 앱 전체가 죽지 않고 map surface와 non-blocking alert가 남아야 한다.",
]
verification_commands = [
  "cd apps/web && npm run test",
  "cd apps/web && npm run build",
  "git diff --check",
]
stop_conditions = [
  "V1 API URL, request field, response field 변경이 필요하면 중단한다.",
  "source frontend의 hardcoded Kakao key 복사가 필요하면 중단한다.",
  "backend, DB schema, ingest 흐름 변경이 필요하면 별도 slice로 분리한다.",
]
risk_notes = [
  "실제 browser visual smoke는 로컬 Kakao key가 없으면 partial evidence로 남긴다.",
  "backend marker 응답이 비어도 runtime smoke의 핵심은 지도 타일과 V1 marker fetch 연결이다.",
]

[[slices]]
id = "marker-rendering-nonblocking-error"
title_ko = "Marker rendering non-blocking error state"
description_ko = "marker API 실패 시 marker layer를 안전하게 정리하고 지도 탐색을 막지 않는 frontend error state를 만든다."
status = "candidate"
priority = 20
targets = "frontend"
preset = "map-ui-state"
acceptance_criteria = [
  "region/complex marker API 실패 시 현재 marker state가 explainable한 빈 상태 또는 이전 안전 상태로 전환된다.",
  "실패 상태가 지도 이동, zoom, 검색 panel 조작을 block하지 않는다.",
  "사용자에게 작은 non-blocking error affordance를 노출하고 다음 성공 응답에서 자동으로 회복한다.",
  "V1 response shape 변경 없이 frontend adapter 내부에서 처리한다.",
]
first_red_candidates = [
  "marker API rejection 이후 map interaction handler가 계속 동작하는지 실패 테스트를 먼저 만든다.",
  "다음 성공 응답에서 error state가 해제되는 테스트를 먼저 만든다.",
]
verification_commands = [
  "cd apps/web && npm run test",
  "cd apps/web && npm run build",
]
stop_conditions = [
  "error 처리를 위해 backend response shape 변경이 필요하면 중단한다.",
  "full-page error boundary로 map surface를 가리게 되면 중단한다.",
]
risk_notes = [
  "실패 marker clearing 정책이 UX상 이전 marker 유지 정책과 충돌할 수 있다.",
  "frontend-only slice이므로 backend worktree를 만들지 않는다.",
]

[[slices]]
id = "data-architecture-checkpoint"
title_ko = "Data architecture checkpoint"
description_ko = "raw ingest, normalized trade, dedupe, failed match, complex_id relation을 실행 전 checkpoint로 정리한다."
status = "candidate"
priority = 30
targets = "planning-only"
preset = "contract-hardening"
acceptance_criteria = [
  "raw ingest row가 normalized trade insert보다 먼저 저장되는 evidence path를 명시한다.",
  "source + source_key dedupe와 fallback dedupe가 중복 normalized trade를 막는지 확인할 테스트 후보를 정한다.",
  "failed match가 queryable/explainable한지 확인할 API 또는 repository seam을 정한다.",
  "operational relation은 complex_id이며 complex_pk, apt_seq, source, source_key는 audit/dedupe 목적으로 보존한다고 명시한다.",
]
first_red_candidates = [
  "중복 source_key ingest가 normalized trade를 두 번 만들면 실패하는 backend test 후보를 정의한다.",
  "MATCH_FAILED raw row 또는 failed match record를 조회할 수 없으면 실패하는 backend test 후보를 정의한다.",
]
verification_commands = [
  "python3 .codex/harness/v1_plan.py --self-test",
  "git diff --check",
]
stop_conditions = [
  "DB schema 변경 또는 migration 실행이 필요하면 planning-only를 종료하고 별도 backend slice로 분리한다.",
  "V1/V2 scope가 섞이면 rankings, favorite, alarm, mail, recommendation 항목을 제외한다.",
]
risk_notes = [
  "planning-only slice는 codex execute, verification, gate, commit, integration, push, PR을 자동 실행하지 않는다.",
  "실제 backend 구현은 별도 backend target slice로 진행한다.",
]

[[slices]]
id = "open-api-ingest-prep"
title_ko = "Open API ingest preparation"
description_ko = "RTMS ingest를 live Open API 호출 없이 준비하고 raw preservation/dedupe 실패를 테스트 가능한 backend 흐름으로 만든다."
status = "candidate"
priority = 40
targets = "backend"
preset = "open-api-ingest-prep"
acceptance_criteria = [
  "live Open API 호출 없이 fixture 또는 mocked client로 raw ingest save path를 검증한다.",
  "raw record 저장 후 normalized trade insert 순서를 public service/repository seam에서 확인한다.",
  "source + source_key dedupe가 동일 raw payload 재처리에서 중복 normalized trade를 만들지 않는다.",
  "match failure가 failure_reason과 함께 queryable evidence로 남는다.",
]
first_red_candidates = [
  "동일 source_key fixture를 두 번 처리하면 normalized trade가 두 개 생기는 실패를 먼저 만든다.",
  "complex match 실패 fixture가 explainable failed match evidence 없이 사라지는 실패를 먼저 만든다.",
]
verification_commands = [
  "cd apps/api && ./gradlew backendQualityCheck",
]
stop_conditions = [
  "live Open API call이 필요하면 중단하고 fixture/mocking으로 대체한다.",
  "DB migration 실행이 필요하면 별도 migration slice로 분리한다.",
  "V1 API URL 변경이 필요하면 중단한다.",
]
risk_notes = [
  "backend-only slice이므로 frontend worktree를 만들지 않는다.",
  "외부 service key나 secrets를 저장하지 않는다.",
]

[[slices]]
id = "map-complex-marker-query-backend"
title_ko = "Map complex marker query backend"
description_ko = "빈 map use case를 V1 parcel/complex/trade query로 교체해 /api/v1/map/complexes marker 응답을 실제 데이터로 반환한다."
status = "planned"
priority = 35
targets = "backend"
preset = "contract-hardening"
acceptance_criteria = [
  "POST /api/v1/map/complexes URL, request field, response field, amount unit, empty-result behavior를 docs/API_CONTRACT.md와 동일하게 유지한다.",
  "bounds 안의 parcel과 연결된 complex를 조회해 parcelId, lat, lng, latestDealAmount, unitCntSum canonical response만 반환한다.",
  "latestDealAmount는 trade.complex_id -> complex.id 운영 관계 기준 최신 거래 금액이며 dealAmount/latestDealAmount 단위는 10,000 KRW이다.",
  "priceEokMin과 priceEokMax는 eok 입력을 10,000 KRW 단위로 변환해 stored trade amount와 비교한다.",
  "ranking, trend, favorite, alarm, mail, auth, recommendation 상태 없이 V1 core tables만으로 동작한다.",
]
first_red_candidates = [
  "JdbcMapMarkerRepositoryTest에서 bounds 안 parcel/complex/trade seed가 complex marker 한 건으로 반환되어야 하나 repository seam 부재 또는 EmptyMapUseCase 때문에 실패한다.",
  "priceEokMin/priceEokMax filter가 eok -> 10,000 KRW 변환 없이 비교되면 잘못 포함 또는 제외되는 실패를 먼저 만든다.",
  "public contract test에서 complexPk, aptSeq, sourceKey 같은 audit/dedupe field가 /api/v1/map/complexes 응답에 노출되면 실패하게 한다.",
]
verification_commands = [
  "cd apps/api && ./gradlew persistenceTest",
  "cd apps/api && ./gradlew apiContractTest",
  "cd apps/api && ./gradlew backendQualityCheck",
  "git diff --check",
]
stop_conditions = [
  "V1 public API URL, request field, response field, ProblemDetail shape 변경이 필요하면 중단한다.",
  "complex_id 운영 관계를 complex_pk 중심으로 재해석해야 하면 중단하고 architecture review로 분리한다.",
  "DB schema 변경, migration 실행, live Open API call, secrets 저장이 필요하면 중단한다.",
  "rankings, trend, favorite, alarm, mail, auth, recommendation dependency가 필요하면 중단한다.",
  "apps/web/** 변경이 필요하면 별도 frontend slice로 분리한다.",
]
risk_notes = [
  "backend-only slice이므로 apps/web/**는 건드리지 않는다.",
  "PostGIS bounds query와 null geom fallback 정책이 실제 seed data에 따라 달라질 수 있다.",
  "latest trade lookup은 partitioned trade table과 complex_id index를 사용해야 한다.",
]

