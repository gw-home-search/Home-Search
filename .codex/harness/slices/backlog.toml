[[slices]]
id = "kakao-map-marker-refresh-flow"
title_ko = "Kakao map marker refresh flow"
pr_type = "Feat"
pr_title_ko = "Kakao 지도 마커 새로고침 안정화"
description_ko = "지도 idle/zoom/filter 변화가 V1 marker API 호출과 marker rendering으로 이어지는 frontend 흐름을 안정화한다."
status = "done"
priority = 10
targets = "frontend"
preset = "map-ui-state"
acceptance_criteria = [
  "Kakao map idle 또는 zoom 변경 시 현재 bounds/level 기준으로 region 또는 complex marker 요청이 한 번의 최신 요청으로 수렴한다.",
  "level <= 4에서는 /api/v1/map/complexes, 그 외 zoom level에서는 /api/v1/map/regions contract를 유지한다.",
  "filter 변경 후 stale marker가 새 응답을 덮어쓰지 않는다.",
  "marker refresh 실패 시 지도 조작은 유지되고 사용자에게 non-blocking state만 노출된다.",
]
first_red_candidates = [
  "marker fetch adapter 단위 테스트에서 늦게 도착한 이전 응답이 최신 marker state를 덮어쓰는 실패를 먼저 만든다.",
  "map level별 endpoint 선택 테스트에서 V1 URL이 바뀌면 실패하게 한다.",
]
verification_commands = [
  "cd apps/web && npm run test",
  "cd apps/web && npm run build",
]
stop_conditions = [
  "V1 API URL, request field, response field 변경이 필요하면 중단한다.",
  "Kakao SDK 실호출이나 외부 네트워크 의존이 필요하면 mock/test seam으로 되돌린다.",
]
risk_notes = [
  "Kakao map 객체 lifecycle과 React state update 순서가 race condition을 만들 수 있다.",
  "frontend-only slice이므로 backend worktree를 만들지 않는다.",
]

[[slices]]
id = "kakao-map-runtime-visual-smoke"
title_ko = "Kakao map runtime visual smoke"
pr_type = "Feat"
pr_title_ko = "Kakao 지도 런타임 스모크 검증"
description_ko = "apps/web에서 실제 Kakao JS SDK 지도 surface를 띄우고 V1 marker fetch 연결을 브라우저로 확인할 수 있게 만든다."
status = "done"
priority = 15
targets = "frontend"
preset = "map-ui-state"
acceptance_criteria = [
  "VITE_KAKAO_MAP_APP_KEY가 있을 때 Kakao JS SDK를 autoload=false로 로드하고 map surface를 ready 상태로 전환한다.",
  "Kakao map idle에서 SDK bounds와 level을 읽어 기존 /api/v1/map/complexes 또는 /api/v1/map/regions marker fetch로 연결한다.",
  "SDK key 누락 또는 SDK load 실패 시 map 영역은 남기고 non-blocking alert만 노출한다.",
  "region/complex marker 응답은 CustomOverlay로 렌더링하고 marker 변경 또는 unmount 때 overlay를 정리한다.",
]
first_red_candidates = [
  "fake Kakao SDK loader를 mock 했을 때 map surface가 ready가 되고 SDK bounds/level 기반으로 marker API fetch가 발생해야 한다.",
  "Kakao key가 없을 때 앱 전체가 죽지 않고 map surface와 non-blocking alert가 남아야 한다.",
]
verification_commands = [
  "cd apps/web && npm run test",
  "cd apps/web && npm run build",
  "git diff --check",
]
stop_conditions = [
  "V1 API URL, request field, response field 변경이 필요하면 중단한다.",
  "source frontend의 hardcoded Kakao key 복사가 필요하면 중단한다.",
  "backend, DB schema, ingest 흐름 변경이 필요하면 별도 slice로 분리한다.",
]
risk_notes = [
  "실제 browser visual smoke는 로컬 Kakao key가 없으면 partial evidence로 남긴다.",
  "backend marker 응답이 비어도 runtime smoke의 핵심은 지도 타일과 V1 marker fetch 연결이다.",
]

[[slices]]
id = "local-dev-stack-postgis-api-web"
title_ko = "Local dev stack PostGIS API web"
pr_type = "Feat"
pr_title_ko = "로컬 PostGIS API Web 실행 스택"
description_ko = "로컬 PostGIS, API, Web runtime을 repository-managed stack으로 묶어 V1 schema/seed/API/frontend를 한 번에 띄울 수 있게 만든다."
status = "done"
priority = 1
targets = "both"
preset = "local-runtime-stack"
acceptance_criteria = [
  "infra/** 아래에 PostGIS 16-3.4 기반 local compose stack을 두고 secrets나 .env* 파일을 commit하지 않는다.",
  "API local runtime은 env 기반 DB 설정으로 PostGIS에 연결하고 Flyway V1 schema와 local seed를 새 DB에서 적용할 수 있다.",
  "Frontend local runtime은 기존 VITE_API_SERVER_IP contract를 유지하며 local API base URL로 marker/search/detail/trade API를 호출할 수 있다.",
  "Backend target은 infra/**와 apps/api/**만, frontend target은 apps/web/**만 소유해 병렬 worktree 충돌을 피한다.",
  "live RTMS Open API 호출, DB migration 운영 실행, main merge/push/PR merge는 자동화하지 않는다.",
]
first_red_candidates = [
  "docker compose -f infra/docker-compose.local.yml config가 compose file 부재로 실패한다.",
  "local profile runtime smoke에서 API가 PostGIS JDBC URL을 받지 못하거나 Flyway V1 schema를 적용하지 못하는 실패를 먼저 만든다.",
  "frontend env base URL smoke에서 VITE_API_SERVER_IP 누락 또는 잘못된 base URL 조합이 marker fetch를 깨뜨리는 실패를 먼저 만든다.",
]
verification_commands = [
  "docker compose -f infra/docker-compose.local.yml config",
  "cd apps/api && ./gradlew backendQualityCheck",
  "cd apps/web && npm run test",
  "cd apps/web && npm run build",
  "git diff --check",
]
stop_conditions = [
  "secrets, service key, .env* 파일 저장이 필요하면 중단한다.",
  "V1 public API URL, request field, response field 변경이 필요하면 중단한다.",
  "Docker daemon이 필요한 destructive DB operation 또는 live DB migration 실행이 필요하면 dry-run/config 검증으로 제한한다.",
  "apps/api와 apps/web이 같은 worktree에서 같은 파일을 동시에 수정해야 하면 slice를 backend/frontend 하위 slice로 분리한다.",
]
risk_notes = [
  "이 slice는 infra 중심이지만 harness target 제약상 backend target이 infra/**와 apps/api/**를 소유한다.",
  "local compose config 검증은 Docker Compose plugin이 없는 환경에서 blocked evidence가 될 수 있다.",
  "실제 브라우저 visual smoke는 mvp-e2e-runtime-smoke에서 별도 처리한다.",
]

[[slices]]
id = "rtms-public-client-one-shot-ingest"
title_ko = "RTMS public client one-shot ingest"
pr_type = "Feat"
pr_title_ko = "RTMS public client one-shot 수집"
description_ko = "APT_SERVICE_KEY 기반 RTMS public client와 one-shot ingest runner를 추가하되 테스트/PR 검증은 fixture와 mocked client로 고정한다."
status = "done"
priority = 2
targets = "backend"
preset = "open-api-ingest-prep"
acceptance_criteria = [
  "RTMS public API 응답을 fixture/mocked client로 파싱해 OpenApiTradeIngestBatch로 변환한다.",
  "one-shot runner는 법정동/월 입력을 받아 existing OpenApiTradeIngestService로 raw-before-normalized ingest를 수행한다.",
  "APT_SERVICE_KEY는 env/config로만 읽고 logs, reports, fixtures, repository files에 저장하지 않는다.",
  "동일 source/source_key 재처리는 duplicate-safe이며 normalized trade를 중복 생성하지 않는다.",
  "match failure와 parse failure는 raw_trade_ingest.status와 failure_reason으로 queryable evidence를 남긴다.",
]
first_red_candidates = [
  "RTMS XML/JSON fixture를 batch로 변환하는 client test가 adapter 부재로 실패한다.",
  "one-shot runner test에서 live network 없이 mocked client 결과가 OpenApiTradeIngestService로 전달되어야 하나 runner 부재로 실패한다.",
  "APT_SERVICE_KEY 누락 시 live 호출을 시도하지 않고 명확한 configuration error로 중단해야 하나 guard 부재로 실패한다.",
]
verification_commands = [
  "cd apps/api && ./gradlew backendQualityCheck",
  "git diff --check",
]
stop_conditions = [
  "PR 검증에서 live Open API call이 필요하면 중단하고 fixture/mocking으로 대체한다.",
  "service key, raw production payload, local secret 저장이 필요하면 중단한다.",
  "V1 public API URL, request field, response field 변경이 필요하면 중단한다.",
  "DB schema 변경이 필요하면 별도 migration slice로 분리한다.",
]
risk_notes = [
  "backend-only slice이므로 apps/web/**는 건드리지 않는다.",
  "runner는 one-shot 운영 진입점만 만들고 scheduler/batch orchestration은 V2 또는 별도 slice로 둔다.",
  "실제 live RTMS 실행은 명시적 사람 승인과 local env가 있을 때만 가능하다.",
]

[[slices]]
id = "live-complex-master-bootstrap"
title_ko = "Live complex master bootstrap"
pr_type = "Feat"
pr_title_ko = "실거래 매칭용 단지 master bootstrap"
description_ko = "RTMS live row가 전부 MATCH_FAILED로 끝나지 않도록 PNU/aptSeq 기반 parcel/complex master bootstrap을 추가한다."
status = "done"
priority = 3
targets = "backend"
preset = "open-api-ingest-prep"
acceptance_criteria = [
  "RTMS item의 sggCd, umdCd, jibun으로 PNU를 만들고 좌표가 확인된 경우에만 parcel을 upsert한다.",
  "aptSeq와 aptName 기반으로 complex를 upsert하고 operational relation은 complex_id, audit metadata는 complex_pk와 apt_seq를 보존한다.",
  "bootstrap은 raw ingest row 저장 이후, existing complex match와 normalized trade insert 이전에 동작한다.",
  "좌표 또는 master 근거가 없으면 fake latitude/longitude를 넣지 않고 explainable MATCH_FAILED로 남긴다.",
  "fixture/mocked coordinate resolver로 normalizedInserted > 0 regression을 검증하고 live public API 호출은 PR 검증에 요구하지 않는다.",
  "V1 public API URL, request field, response field, amount unit, ProblemDetail shape를 변경하지 않는다.",
]
first_red_candidates = [
  "OpenApiTradeIngestServiceJdbcIntegrationTest에서 master가 없는 RTMS item도 mocked bootstrap 성공 시 normalized trade가 insert되어야 하나 현재 MATCH_FAILED로 남는 실패를 먼저 만든다.",
  "bootstrap coordinate resolver가 empty를 반환하면 parcel/complex를 생성하지 않고 MATCH_FAILED failure_reason이 남아야 하는 regression을 먼저 만든다.",
  "재실행 시 source/source_key dedupe가 normalized trade를 중복 생성하지 않는 integration test를 먼저 만든다.",
]
verification_commands = [
  "cd apps/api && ./gradlew backendQualityCheck",
  "git diff --check",
]
stop_conditions = [
  "PR 검증에서 live VWorld, ODC, RTMS Open API call이 필요하면 중단하고 fixture/mocking으로 대체한다.",
  "service key, raw production payload, local secret 저장이 필요하면 중단한다.",
  "fake latitude/longitude 또는 근거 없는 parcel geometry를 저장해야 하면 중단한다.",
  "V1 public API URL, request field, response field, amount unit, ProblemDetail shape 변경이 필요하면 중단한다.",
  "rankings, trend, favorite, alarm, mail, auth, recommendation dependency가 필요하면 중단한다.",
  "apps/web/** 변경이 필요하면 별도 frontend slice로 분리한다.",
]
risk_notes = [
  "backend-only slice이므로 apps/web/**는 건드리지 않는다.",
  "RTMS payload만으로는 좌표가 부족하므로 coordinate resolver는 테스트에서 mock하고 live 실행은 local env가 있을 때 수동 evidence로만 남긴다.",
  "complex_pk 생성 정책이 임시값으로 흐르면 audit 품질이 떨어질 수 있어 source/source_key와 aptSeq 기반 deterministic key 정책을 테스트로 고정해야 한다.",
]

