  "- `cd apps/api && ./gradlew test --tests '*NaverNewsSignalPipelineApplicationRunnerTest.truncatedObsidianExportFailsPipeline'` = pass (мөңмҶҢ GREEN: truncated exportлҘј IllegalStateExceptionмңјлЎң мӢӨнҢЁ мІҳлҰ¬)",
