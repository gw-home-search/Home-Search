  "domain/** 추출 대상이 ingest, coordinate, complex, trade 전체로 커지면 foundation guardrail과 실제 domain move를 분리한다.",
  "apps/web/** 변경이 필요하면 별도 frontend slice로 분리한다.",
  "same branch에서 진행하더라도 unrelated cleanup, news later-scope domain화, source repo style import를 섞지 않는다.",
]
risk_notes = [
