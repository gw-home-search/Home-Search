  "cd apps/api && ./gradlew apiContractTest --tests com.home.infrastructure.web.admin.CoordinateOverrideAdminControllerContractTest",
  "cd apps/api && ./gradlew backendQualityCheck",
  "python3 scripts/check-test-display-names.py",
  "python3 .codex/harness/project_terms_check.py",
  "git diff --check",
]
verification_evidence = [
  "- `cd apps/api && ./gradlew persistenceTest --tests com.home.infrastructure.persistence.coordinate.JdbcCoordinateOverrideAdminRepositoryTest` = fail (мөңмҙҲ RED: CoordinatePendingComplex reason fieldк°Җ production mapperм—җ м—Ҷм–ҙ compile мӢӨнҢЁ)",
  "- `cd apps/api && ./gradlew persistenceTest --tests com.home.infrastructure.persistence.coordinate.JdbcCoordinateOverrideAdminRepositoryTest` = pass (мөңмҶҢ GREEN: PNU_COORDINATE_MISSING, SAME_PNU_MULTI_COMPLEX, COMPLEX_DISPLAY_COORDINATE_MISSING л¶„лҘҳ нҶөкіј)",
  "- `cd apps/api && ./gradlew persistenceTest --tests com.home.infrastructure.persistence.coordinate.JdbcCoordinateOverrideAdminRepositoryTest` = pass (gate ліҙк°•: PARCEL_FALLBACK-onlyмҷҖ BUILDING_FOOTPRINT+PARCEL_FALLBACK mixed regression нҶөкіј)",
