[[items]]
id = "rtms-storage-quality-verification"
title_ko = "RTMS storage quality verification"
pr_type = "Test"
pr_title_ko = "RTMS 저장 품질 검증 고도화"
description_ko = "기존 VWorld 좌표 DB 기반 RTMS 저장 결과를 raw/evidence/parcel/complex/trade/read-path invariant로 검증할 수 있게 fixture 기반 backend 회귀 테스트와 local 검증 기준을 고정한다."
status = "done"
priority = 180
targets = "backend"
preset = "open-api-ingest-prep"
acceptance_criteria = [
  "raw ingest row 수는 status별 outcome 합계로 설명 가능해야 하며 NORMALIZED, CANCELED, DUPLICATE, MATCH_FAILED, PARSE_FAILED가 실패/성공 의미를 혼동하지 않게 검증된다.",
  "NORMALIZED raw row는 MATCHED trade_match_evidence와 연결되고 active trade는 complex_id -> complex -> parcel join이 가능해야 한다.",
  "같은 PNU와 같은 지번이라도 apt_seq가 다르면 같은 parcel 아래 별도 complex로 저장되고 trade는 각 complex_id로 분리된다.",
  "parcel marker는 같은 parcel 아래 복수 complex를 1개 marker로 묶고 latestDealAmount는 parcel 내 active trade 기준으로 계산된다.",
  "RTMS cancellation row는 raw_trade_ingest.status=CANCELED로 저장되고 active public trade 생성 없이 동일 source_key의 기존 trade만 soft-delete한다.",
  "검증은 fixture/mocked client/local SQL로 고정하고 PR 검증에 live RTMS, live VWorld, service key, raw production payload를 요구하지 않는다.",
  "public map/search/region/detail/trade API URL, response shape, amount unit, ProblemDetail shape를 변경하지 않는다.",
]
first_red_candidates = [
  "IngestToReadPathJdbcIntegrationTest 또는 새 RtmsStorageQualityJdbcIntegrationTest에서 같은 PNU/지번 + 다른 apt_seq 2개가 marker 1개, complex 2개, complex별 trade 분리로 고정되지 않아 실패하는 RED를 만든다.",
  "취소 row fixture가 raw CANCELED로 남고 active trade에서 제외되는지 read-path까지 검증하지 못하는 실패를 먼저 만든다.",
  "NORMALIZED raw row와 MATCHED evidence, active trade의 complex/parcel join completeness를 한 번에 검증하는 storage quality assertion 부재를 RED로 만든다.",
]
