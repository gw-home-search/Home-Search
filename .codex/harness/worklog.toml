id = "map-marker-read-path-readiness-hardening"
title_ko = "Map marker read path readiness hardening"
pr_type = "Feat"
pr_title_ko = "지도 마커 read-path 성능과 분리 정책 보강"
description_ko = "RTMS 특수지역 10년치 readiness에서 확인된 /api/v1/map/complexes 지연과 same-PNU fallback 과다 노출을 줄이기 위해 bounds-first marker query와 저장된 고신뢰 complex_display_coordinate split 정책을 보강한다."
