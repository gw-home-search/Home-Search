[[items]]
id = "map-marker-redis-performance-gate"
title_ko = "Map marker Redis performance gate"
pr_type = "Test"
pr_title_ko = "м§ҖлҸ„ л§Ҳм»Ө Redis м„ұлҠҘ gate кІҖмҰқ"
description_ko = "POST /api/v1/map/complexes Redis read-through cacheмқҳ off/cold/warm м„ұлҠҘ м°ЁмқҙмҷҖ hit/miss/fallback metricмқ„ мһ¬нҳ„ к°ҖлҠҘн•ң k6/Prometheus evidenceлЎң кі м •н•ңлӢӨ."
status = "done"
priority = 250
targets = "backend"
preset = "runtime-smoke"
acceptance_criteria = [
  "POST /api/v1/map/complexes URL, request field, response field, amount unit, empty-result behaviorлҘј ліҖкІҪн•ҳм§Җ м•ҠлҠ”лӢӨ.",
  "Redis cache кё°ліёк°’мқҖ offлЎң мң м§Җн•ҳкі , enable мғҒнғңм—җм„ңл§Ң read-through cacheк°Җ лҸҷмһ‘н•ңлӢӨ.",
  "к°ҷмқҖ COMPLEX_CASE=seed-wide мҡ”мІӯмңјлЎң Redis off baseline, Redis cold miss 1нҡҢ, Redis warm hit baselineмқ„ л¶„лҰ¬ мёЎм •н•ңлӢӨ.",
  "k6 мёЎм •мқҖ checks 100%, http_req_failed 0%лҘј л§ҢмЎұн•ҙм•ј н•ңлӢӨ.",
  "Redis warm hit p95к°Җ Redis off p95 лҢҖл№„ лӘ…нҷ•нһҲ к°ңм„ лҗң мҲҳм№ҳлЎң кё°лЎқлҗңлӢӨ.",
  "Prometheus metric home_search_map_marker_cache_requests_total лҳҗлҠ” лҸҷл“ұ metricм—җм„ң result=hit|miss|fallback кҙҖмёЎ к°ҖлҠҘм„ұмқ„ нҷ•мқён•ңлӢӨ.",
  "Redis мһҘм•  лҳҗлҠ” лҜём—°кІ°мқҖ marker API мӢӨнҢЁк°Җ м•„лӢҲлқј JDBC fallbackмңјлЎң лӮЁлҠ”лӢӨ.",
  "м„ұлҠҘ кІ°кіјмҷҖ мӢӨн–ү лӘ…л №мқҖ apps/api/perf л¬ём„ң лҳҗлҠ” results нҢҢмқјм—җ лӮЁкё°л©° secrets, service key, production payloadлҘј м ҖмһҘн•ҳм§Җ м•ҠлҠ”лӢӨ.",
  "raw-before-normalized, duplicate-safe ingest, failed match queryability, complex_id operational relationмқ„ ліҖкІҪн•ҳм§Җ м•ҠлҠ”лӢӨ.",
]
first_red_candidates = [
  "Redis cache metric лҳҗлҠ” TTL/key/fallback мҪ”л“ңк°Җ л°”лҖҢм–ҙм•ј н•ҳл©ҙ RedisCachingComplexMarkerRepositoryTestм—җ hit/miss/fallback REDлҘј лЁјм Җ м¶”к°Җн•ңлӢӨ.",
  "runtime evidence л¬ём„ңл§Ң ліҙк°•н•ҳлҠ” кІҪмҡ° production behavior REDлҠ” not applicableмқҙл©° k6 smoke/baselineкіј Prometheus scrapeлҘј gate evidenceлЎң мӮ¬мҡ©н•ңлӢӨ.",
]
verification_commands = [
  "docker compose -f infra/docker-compose.local.yml config",
  "cd apps/api && ./gradlew backendQualityCheck",
  "k6 run -e SCENARIO=smoke -e BASE_URL=http://localhost:8080 -e COMPLEX_WEIGHT=1 -e REGION_WEIGHT=0 -e COMPLEX_CASE=seed-wide apps/api/perf/k6/map-marker-baseline.js",
  "k6 run -e SCENARIO=baseline -e BASE_URL=http://localhost:8080 -e TARGET_RPS=1 -e COMPLEX_WEIGHT=1 -e REGION_WEIGHT=0 -e COMPLEX_CASE=seed-wide -e RAMP_UP=1s -e STEADY=10s -e RAMP_DOWN=1s apps/api/perf/k6/map-marker-baseline.js",
  "git diff --check",
]
stop_conditions = [
  "public API URL, request field, response field, amount unit, ProblemDetail shape ліҖкІҪмқҙ н•„мҡ”н•ҳл©ҙ мӨ‘лӢЁн•ңлӢӨ.",
  "Docker volume мӮӯм ң, DB reset, docker compose down -v, Redis/DB destructive cleanupмқҙ н•„мҡ”н•ҳл©ҙ мӨ‘лӢЁн•ңлӢӨ.",
  "production default cache enable лҳҗлҠ” ingest нӣ„ cache invalidation м •мұ… кө¬нҳ„мқҙ н•„мҡ”н•ҳл©ҙ нӣ„мҶҚ sliceлЎң л¶„лҰ¬н•ңлӢӨ.",
  "live RTMS/Open API нҳём¶ң, service key, local secret, raw production payload м ҖмһҘмқҙ н•„мҡ”н•ҳл©ҙ мӨ‘лӢЁн•ңлӢӨ.",
  "apps/web/** ліҖкІҪмқҙ н•„мҡ”н•ҳл©ҙ лі„лҸ„ frontend sliceлЎң л¶„лҰ¬н•ңлӢӨ.",
]
risk_notes = [
  "Redis cold missлҠ” DB мЎ°нҡҢ л№„мҡ©мқ„ к·ёлҢҖлЎң к°Җм§„лӢӨ.",
  "TTLмқҖ лҚ°мқҙн„° ліҖкІҪ м§Ғнӣ„ stale marker н—Ҳмҡ© мӢңк°„мқ„ мқҳлҜён•ҳлҜҖлЎң production rolloutмқҖ лі„лҸ„ invalidation/TTL м •мұ… нҢҗлӢЁмқҙ н•„мҡ”н•ҳлӢӨ.",
  "мқҙлІҲ sliceлҠ” performance gate/evidence кі м •мқҙл©° мғҲ read modelмқҙлӮҳ SQL мһ¬м„Өкі„лҠ” нҸ¬н•Ён•ҳм§Җ м•ҠлҠ”лӢӨ.",
]

[[items]]
id = "news-obsidian-pipeline-e2e-hardening"
title_ko = "News Obsidian pipeline E2E hardening"
pr_type = "Test"
pr_title_ko = "лүҙмҠӨ Obsidian pipeline E2E кІҖмҰқ к°•нҷ”"
