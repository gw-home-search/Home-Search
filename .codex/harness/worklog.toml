[[items]]
id = "read-search-trgm-and-multi-complex-policy"
title_ko = "Read search trigram and multi complex policy"
pr_type = "Feat"
pr_title_ko = "검색 trigram 인덱스와 다중 단지 표시 정책"
description_ko = "complex alias 검색 경로의 substring 검색 성능 기반을 pg_trgm/GIN index로 고정하고 parcel↔다중 complex 표시 정책을 API/지도 문서에 명문화한다."
status = "done"
priority = 160
targets = "backend"
preset = "contract-hardening"
acceptance_criteria = [
  "GET /api/v1/search/complexes?q= URL, request field, response field, empty-result behavior를 유지한다.",
  "complex_name_alias.normalized_name substring 검색을 위한 pg_trgm extension과 GIN trigram index가 Flyway baseline에 포함된다.",
  "lower(alias_name) 검색 경로도 alias_name 원문 substring 검색을 위해 index-backed 후보로 검증한다.",
  "검색 결과의 public response shape와 display name 우선순위는 기존 trade_name fallback 정책을 유지한다.",
  "parcel↔다중 complex 정책을 docs/MAP_DISPLAY_FLOW.md와 docs/API_CONTRACT.md에 명문화한다.",
  "다중 complex parcel에서 map marker는 parcel 단위 1개, unitCntSum은 complex unit 합산, latestDealAmount는 parcel 내 최신 normalized trade 기준임을 고정한다.",
  "detail은 대표 complex 1개, trade list는 parcel 내 모든 complex 거래, search result는 complex 단위이며 같은 parcelId가 여러 결과에 나타날 수 있음을 명시한다.",
]
first_red_candidates = [
  "JdbcPropertyReadRepositoryTest에서 complex_name_alias trigram index와 pg_trgm extension 존재를 검증해 현재 migration이 GIN trigram index를 만들지 않아 실패하는 RED를 만든다.",
  "JdbcMapMarkerRepositoryTest에서 같은 parcel 아래 여러 complex가 있을 때 marker 1개, unitCntSum 합산, latestDealAmount 최신 거래 정책을 regression으로 고정한다.",
  "JdbcPropertyReadRepositoryTest에서 search result가 complex 단위라 같은 parcelId를 가진 여러 result를 반환할 수 있음을 고정한다.",
]
verification_commands = [
  "cd apps/api && ./gradlew persistenceTest --tests com.home.infrastructure.persistence.read.JdbcPropertyReadRepositoryTest --tests com.home.infrastructure.persistence.map.JdbcMapMarkerRepositoryTest",
  "cd apps/api && ./gradlew backendQualityCheck",
  "python3 .codex/harness/project_terms_check.py",
  "python3 .codex/harness/pr_lint.py --self-test",
  "python3 .codex/harness/home_pr.py --self-test",
  "git diff --check",
]
