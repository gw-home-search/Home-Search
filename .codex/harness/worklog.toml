[[items]]
id = "coordinate-admin-minimal-reason-queue"
title_ko = "Coordinate admin minimal reason queue"
pr_type = "Feat"
pr_title_ko = "좌표 관리자 큐 최소 reason 분류"
description_ko = "RTMS 전체 저장 직전에 marker-pending/fallback 좌표 예외를 과하게 자동 해결하지 않고 관리자 override로 넘길 수 있도록 3개 최소 reason과 marker 재노출 경로를 고정한다."
status = "done"
priority = 230
targets = "backend"
preset = "backend-quality"
acceptance_criteria = [
  "GET /api/v1/admin/coordinates/pending은 marker-safe가 아닌 저장 row를 PNU_COORDINATE_MISSING, SAME_PNU_MULTI_COMPLEX, COMPLEX_DISPLAY_COORDINATE_MISSING 중 하나로 분류한다.",
  "좌표 없는 확정 매칭 거래는 저장 가능하며 public marker에는 노출되지 않는다.",
  "same-PNU multi-complex는 고신뢰 complex display coordinate 없이는 임의 split하지 않는다.",
  "일부 same-PNU complex만 display coordinate가 있으면 좌표가 없는 complex만 COMPLEX_DISPLAY_COORDINATE_MISSING으로 관리자 큐에 남긴다.",
  "PARCEL_FALLBACK display coordinate는 same-PNU complex split 완료 증거로 보지 않고 관리자 큐 reason을 유지한다.",
  "기존 PUT /api/v1/admin/coordinates/{pnu}/override가 parcel 좌표를 채운 뒤 marker-safe 경로를 복구한다.",
  "public /api/v1/map/complexes, /api/v1/detail/{parcelId}, /api/v1/trade/{parcelId} URL, request/response shape, amount unit을 변경하지 않는다.",
  "raw ingest, trade_match_evidence, normalized trade dedupe/cancel invariant와 complex_id 운영 relation은 변경하지 않는다.",
]
first_red_candidates = [
  "JdbcCoordinateOverrideAdminRepositoryTest에서 reason field가 없거나 PNU 좌표 누락 reason을 반환하지 못하면 실패하는 RED를 만든다.",
  "JdbcCoordinateOverrideAdminRepositoryTest에서 same-PNU 2개 complex에 display coordinate가 없는데 관리자 큐 reason이 SAME_PNU_MULTI_COMPLEX가 아니면 실패하는 RED를 만든다.",
  "JdbcCoordinateOverrideAdminRepositoryTest에서 일부 same-PNU complex만 display coordinate가 있을 때 좌표 없는 complex가 COMPLEX_DISPLAY_COORDINATE_MISSING으로 남지 않으면 실패하는 RED를 만든다.",
  "JdbcCoordinateOverrideAdminRepositoryTest에서 same-PNU 2개 complex에 PARCEL_FALLBACK 좌표만 있는데 관리자 큐에서 사라지면 실패하는 regression RED를 만든다.",
  "CoordinateOverrideAdminControllerContractTest에서 admin pending response에 optional reason이 없으면 실패하는 contract RED를 만든다.",
]
verification_commands = [
  "cd apps/api && ./gradlew persistenceTest --tests com.home.infrastructure.persistence.coordinate.JdbcCoordinateOverrideAdminRepositoryTest",
  "cd apps/api && ./gradlew apiContractTest --tests com.home.infrastructure.web.admin.CoordinateOverrideAdminControllerContractTest",
  "cd apps/api && ./gradlew backendQualityCheck",
  "python3 scripts/check-test-display-names.py",
  "python3 .codex/harness/project_terms_check.py",
  "git diff --check",
]
