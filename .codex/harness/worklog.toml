[[items]]
id = "coordinate-admin-minimal-reason-queue"
title_ko = "Coordinate admin minimal reason queue"
pr_type = "Feat"
pr_title_ko = "мўҢн‘ң кҙҖлҰ¬мһҗ нҒҗ мөңмҶҢ reason л¶„лҘҳ"
description_ko = "RTMS м „мІҙ м ҖмһҘ м§Ғм „м—җ marker-pending/fallback мўҢн‘ң мҳҲмҷёлҘј кіјн•ҳкІҢ мһҗлҸҷ н•ҙкІ°н•ҳм§Җ м•Ҡкі  кҙҖлҰ¬мһҗ overrideлЎң л„ҳкёё мҲҳ мһҲлҸ„лЎқ 3к°ң мөңмҶҢ reasonкіј marker мһ¬л…ём¶ң кІҪлЎңлҘј кі м •н•ңлӢӨ."
status = "done"
priority = 230
targets = "backend"
preset = "backend-quality"
acceptance_criteria = [
  "GET /api/v1/admin/coordinates/pendingмқҖ marker-safeк°Җ м•„лӢҢ м ҖмһҘ rowлҘј PNU_COORDINATE_MISSING, SAME_PNU_MULTI_COMPLEX, COMPLEX_DISPLAY_COORDINATE_MISSING мӨ‘ н•ҳлӮҳлЎң л¶„лҘҳн•ңлӢӨ.",
  "мўҢн‘ң м—ҶлҠ” нҷ•м • л§Өм№ӯ кұ°лһҳлҠ” м ҖмһҘ к°ҖлҠҘн•ҳл©° public markerм—җлҠ” л…ём¶ңлҗҳм§Җ м•ҠлҠ”лӢӨ.",
  "same-PNU multi-complexлҠ” кі мӢ лў° complex display coordinate м—ҶмқҙлҠ” мһ„мқҳ splitн•ҳм§Җ м•ҠлҠ”лӢӨ.",
  "мқјл¶Җ same-PNU complexл§Ң display coordinateк°Җ мһҲмңјл©ҙ мўҢн‘ңк°Җ м—ҶлҠ” complexл§Ң COMPLEX_DISPLAY_COORDINATE_MISSINGмңјлЎң кҙҖлҰ¬мһҗ нҒҗм—җ лӮЁкёҙлӢӨ.",
  "PARCEL_FALLBACK display coordinateлҠ” same-PNU complex split мҷ„лЈҢ мҰқкұ°лЎң ліҙм§Җ м•Ҡкі  кҙҖлҰ¬мһҗ нҒҗ reasonмқ„ мң м§Җн•ңлӢӨ.",
  "кё°мЎҙ PUT /api/v1/admin/coordinates/{pnu}/overrideк°Җ parcel мўҢн‘ңлҘј мұ„мҡҙ л’Ө marker-safe кІҪлЎңлҘј ліөкө¬н•ңлӢӨ.",
  "public /api/v1/map/complexes, /api/v1/detail/{parcelId}, /api/v1/trade/{parcelId} URL, request/response shape, amount unitмқ„ ліҖкІҪн•ҳм§Җ м•ҠлҠ”лӢӨ.",
  "raw ingest, trade_match_evidence, normalized trade dedupe/cancel invariantмҷҖ complex_id мҡҙмҳҒ relationмқҖ ліҖкІҪн•ҳм§Җ м•ҠлҠ”лӢӨ.",
]
first_red_candidates = [
  "JdbcCoordinateOverrideAdminRepositoryTestм—җм„ң reason fieldк°Җ м—Ҷкұ°лӮҳ PNU мўҢн‘ң лҲ„лқҪ reasonмқ„ л°ҳнҷҳн•ҳм§Җ лӘ»н•ҳл©ҙ мӢӨнҢЁн•ҳлҠ” REDлҘј л§Ңл“ лӢӨ.",
  "JdbcCoordinateOverrideAdminRepositoryTestм—җм„ң same-PNU 2к°ң complexм—җ display coordinateк°Җ м—ҶлҠ”лҚ° кҙҖлҰ¬мһҗ нҒҗ reasonмқҙ SAME_PNU_MULTI_COMPLEXк°Җ м•„лӢҲл©ҙ мӢӨнҢЁн•ҳлҠ” REDлҘј л§Ңл“ лӢӨ.",
  "JdbcCoordinateOverrideAdminRepositoryTestм—җм„ң мқјл¶Җ same-PNU complexл§Ң display coordinateк°Җ мһҲмқ„ л•Ң мўҢн‘ң м—ҶлҠ” complexк°Җ COMPLEX_DISPLAY_COORDINATE_MISSINGмңјлЎң лӮЁм§Җ м•Ҡмңјл©ҙ мӢӨнҢЁн•ҳлҠ” REDлҘј л§Ңл“ лӢӨ.",
  "JdbcCoordinateOverrideAdminRepositoryTestм—җм„ң same-PNU 2к°ң complexм—җ PARCEL_FALLBACK мўҢн‘ңл§Ң мһҲлҠ”лҚ° кҙҖлҰ¬мһҗ нҒҗм—җм„ң мӮ¬лқјм§Җл©ҙ мӢӨнҢЁн•ҳлҠ” regression REDлҘј л§Ңл“ лӢӨ.",
  "CoordinateOverrideAdminControllerContractTestм—җм„ң admin pending responseм—җ optional reasonмқҙ м—Ҷмңјл©ҙ мӢӨнҢЁн•ҳлҠ” contract REDлҘј л§Ңл“ лӢӨ.",
]
