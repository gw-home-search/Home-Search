  "cd apps/api && ./gradlew backendQualityCheck",
  "git diff --check",
]
stop_conditions = [
  "public API URL, request field, response field, amount unit, ProblemDetail shape 변경이 필요하면 중단한다.",
  "live RTMS/VWorld API 호출, service key, local secret, raw production payload, .env* 파일 저장이 필요하면 중단한다.",
  "VWorld 좌표 재수집/import 또는 운영 DB destructive migration 실행이 필요하면 중단한다.",
  "대표 complex 표시 정책이나 frontend UI 변경이 필요하면 별도 slice로 분리한다.",
  "ranking, trend aggregate, favorite, alarm, mail, auth, recommendation 기능이 필요하면 중단한다.",
]
risk_notes = [
  "이번 slice는 live 저장 결과를 재현 가능한 fixture 회귀 테스트로 끌어내리는 검증 강화 작업이다.",
  "기존 좌표 DB manual smoke는 evidence로만 남기고 CI/PR gate는 deterministic test로 닫는다.",
  "같은 parcel에 여러 complex가 있는 케이스는 데이터 오류가 아니라 marker grouping 정책으로 고정한다.",
