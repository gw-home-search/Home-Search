  "BackendEnumDocumentationTest를 domain root까지 확장해 domain enum이 titleKo()/descriptionKo() 또는 class JavaDoc 없이 추가되면 실패하도록 만든다.",
  "BackendApplicationPackageStructureTest 또는 신규 foundation test에서 root AGENTS.md의 Domain Principles section이 없으면 실패하도록 만들어 운영 규칙 누락을 RED로 고정한다.",
]
verification_commands = [
