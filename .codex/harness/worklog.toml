  "운영 DB에서 CREATE EXTENSION pg_trgm 권한 또는 허용 정책이 불명확하면 migration 적용 전략을 재검토한다.",
  "apps/web/** 변경이 필요하면 별도 frontend slice로 분리한다.",
  "ranking, trend aggregate, favorite, alarm, mail, auth, recommendation 기능이 필요하면 중단한다.",
]
