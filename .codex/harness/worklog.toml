priority = 240
targets = "backend"
preset = "open-api-ingest-prep"
acceptance_criteria = [
  "fake Naver responseк°Җ мӢӨм ң JDBC repositoryлҘј нҶөн•ҙ news_article_observationмңјлЎң м ҖмһҘлҗңлӢӨ.",
