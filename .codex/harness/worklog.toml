  "к°ҷмқҖ fake responseлҘј мһ¬мӢӨн–үн•ҙлҸ„ observationкіј featureк°Җ мӨ‘ліө мғқм„ұлҗҳм§Җ м•ҠлҠ”лӢӨ.",
  "pipeline exportк°Җ maxRows мҙҲкіјлЎң truncated=trueк°Җ лҗҳл©ҙ мҷ„лЈҢлЎң мІҳлҰ¬н•ҳм§Җ м•ҠлҠ”лӢӨ.",
  "live Naver API нҳём¶ң, credentials, secrets м ҖмһҘ м—Ҷмқҙ кІҖмҰқн•ңлӢӨ.",
  "public map/search/region/detail/trade API URL, request/response shape, amount unit, ProblemDetail shapeлҘј ліҖкІҪн•ҳм§Җ м•ҠлҠ”лӢӨ.",
]
first_red_candidates = [
  "NaverNewsSignalPipelineJdbcIntegrationTestм—җм„ң accepted fake news 2кұҙкіј obsidianMaxRows=1лЎң pipelineмқ„ мӢӨн–үн–Ҳмқ„ л•Ң нҳ„мһ¬ runnerк°Җ truncated exportлҘј м„ұкіө мІҳлҰ¬н•ҳл©ҙ мӢӨнҢЁн•ҳлҠ” REDлҘј л§Ңл“ лӢӨ.",
  "NaverNewsSignalPipelineJdbcIntegrationTestм—җм„ң fake Naver response 2кұҙмқҙ DB featureмҷҖ Obsidian daily noteлЎң мқҙм–ҙм§Җм§Җ м•Ҡмңјл©ҙ мӢӨнҢЁн•ҳлҠ” integration REDлҘј л§Ңл“ лӢӨ.",
  "NaverNewsSignalPipelineJdbcIntegrationTestм—җм„ң к°ҷмқҖ fake response мһ¬мӢӨн–ү нӣ„ observation/feature мӨ‘ліөмқҙ мғқкё°л©ҙ мӢӨнҢЁн•ҳлҠ” regression REDлҘј л§Ңл“ лӢӨ.",
]
verification_commands = [
