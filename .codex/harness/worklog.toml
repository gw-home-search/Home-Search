  "이번 slice는 검색 품질/ranking 개선이 아니라 기존 substring 검색 경로의 성능 기반과 contract 문서화를 고정한다.",
  "문서 명문화는 기존 암묵 동작을 설명하며 public API field를 추가하지 않는다.",
