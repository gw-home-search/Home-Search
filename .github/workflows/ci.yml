name: ci

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Run backend tests
        working-directory: apps/api
        run: ./gradlew backendQualityCheck
      - name: Upload backend quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-artifacts
          path: |
            apps/api/build/reports/tests/
            apps/api/build/reports/jacoco/
            apps/api/build/docs/asciidoc/
            apps/api/build/api-spec/openapi3.yaml
          if-no-files-found: ignore

  frontend-test-build:
    name: frontend-test-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci
      - name: Run frontend tests
        working-directory: apps/web
        run: npm run test
      - name: Build frontend
        working-directory: apps/web
        run: npm run build

  diff-check:
    name: diff-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check diff whitespace
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}"
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^..HEAD
          else
            git diff --check
          fi
