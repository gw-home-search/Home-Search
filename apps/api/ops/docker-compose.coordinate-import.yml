name: home-search-local

services:
  coordinate-importer:
    image: postgis/postgis:16-3.4-alpine
    platform: ${HOME_COORDINATE_IMPORT_PLATFORM:-linux/amd64}
    container_name: home-search-coordinate-importer
    profiles:
      - coordinate-import
    depends_on:
      postgis:
        condition: service_healthy
    working_dir: /workspace/apps/api
    entrypoint: ["bash", "/workspace/apps/api/ops/import-vworld-coordinate-snapshot.sh"]
    environment:
      PGHOST: postgis
      PGPORT: "5432"
      PGDATABASE: ${HOME_SEARCH_DB_NAME:-home_search}
      PGUSER: ${HOME_SEARCH_DB_USERNAME:-home_search}
      PGPASSWORD: ${HOME_SEARCH_DB_PASSWORD:-home_search_local_password}
      HOME_COORDINATE_SHP_DIR: /coordinate-input
      HOME_COORDINATE_SNAPSHOT_VERSION: ${HOME_COORDINATE_SNAPSHOT_VERSION:-}
      HOME_COORDINATE_INPUT_FORMAT: ${HOME_COORDINATE_INPUT_FORMAT:-auto}
      HOME_COORDINATE_EXPECTED_REGIONS: ${HOME_COORDINATE_EXPECTED_REGIONS:-}
      HOME_COORDINATE_SOURCE_SRID: ${HOME_COORDINATE_SOURCE_SRID:-5186}
      HOME_COORDINATE_TARGET_SRID: ${HOME_COORDINATE_TARGET_SRID:-4326}
      HOME_COORDINATE_REQUIRE_FULL_REGIONS: ${HOME_COORDINATE_REQUIRE_FULL_REGIONS:-true}
      HOME_COORDINATE_ALLOW_MIXED_VERSION: ${HOME_COORDINATE_ALLOW_MIXED_VERSION:-false}
      HOME_COORDINATE_STRICT_REGION_MATCH: ${HOME_COORDINATE_STRICT_REGION_MATCH:-true}
      HOME_COORDINATE_VALIDATE_PRJ: ${HOME_COORDINATE_VALIDATE_PRJ:-true}
      HOME_COORDINATE_SYNC_PARCEL: ${HOME_COORDINATE_SYNC_PARCEL:-true}
      HOME_COORDINATE_RESUME_RUN_ID: ${HOME_COORDINATE_RESUME_RUN_ID:-}
      HOME_COORDINATE_CHUNK_PREFIX_LENGTH: ${HOME_COORDINATE_CHUNK_PREFIX_LENGTH:-5}
    volumes:
      - ${HOME_SEARCH_REPO_DIR:-..}:/workspace:ro
      - ${HOME_COORDINATE_HOST_SHP_DIR:-../coordinate-input}:/coordinate-input:ro
    networks:
      - home-search-local

  coordinate-smoke-verifier:
    image: postgis/postgis:16-3.4-alpine
    platform: ${HOME_COORDINATE_IMPORT_PLATFORM:-linux/amd64}
    container_name: home-search-coordinate-smoke-verifier
    profiles:
      - coordinate-import
    depends_on:
      postgis:
        condition: service_healthy
    working_dir: /workspace/apps/api
    entrypoint: ["bash", "/workspace/apps/api/ops/verify-coordinate-snapshot-smoke.sh"]
    environment:
      PGHOST: postgis
      PGPORT: "5432"
      PGDATABASE: ${HOME_SEARCH_DB_NAME:-home_search}
      PGUSER: ${HOME_SEARCH_DB_USERNAME:-home_search}
      PGPASSWORD: ${HOME_SEARCH_DB_PASSWORD:-home_search_local_password}
      HOME_COORDINATE_EXPECTED_REGIONS: ${HOME_COORDINATE_EXPECTED_REGIONS:-}
      HOME_COORDINATE_MIN_PNU_COUNT: ${HOME_COORDINATE_MIN_PNU_COUNT:-1}
      HOME_COORDINATE_REQUIRE_SYNC_PARCEL: ${HOME_COORDINATE_REQUIRE_SYNC_PARCEL:-false}
      HOME_COORDINATE_VERIFY_ACTIVE_COUNT: ${HOME_COORDINATE_VERIFY_ACTIVE_COUNT:-false}
    volumes:
      - ${HOME_SEARCH_REPO_DIR:-..}:/workspace:ro
    networks:
      - home-search-local
