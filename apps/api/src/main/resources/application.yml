spring:
  application:
    name: home-search-api
  profiles:
    default: local
  flyway:
    locations: classpath:db/migration/api

apis:
  data:
    base-url: https://apis.data.go.kr
    apt-service-key: "${APT_SERVICE_KEY:}"
    apt-title-path: /1613000/RTMSDataSvcAptTradeDev/getRTMSDataSvcAptTradeDev
    apt-num-of-rows: 1000
    connect-timeout-millis: 5000
    read-timeout-millis: 5000

vworld:
  data:
    base-url: https://api.vworld.kr
    vw-service-key: "${VW_SERVICE_KEY:}"
    vm-domain: "${VWORLD_DOMAIN:http://localhost:8080/only-local-test}"
    vm-wfs-path: /ned/wfs/getBldgisSpceWFS
    num-of-rows: 100
    connect-timeout-millis: 5000
    read-timeout-millis: 5000

management:
  health:
    redis:
      enabled: false

home:
  map:
    marker-cache:
      enabled: false
      ttl: 5m
  admin:
    coordinate-override:
      enabled: false
      access-code: "${ADMIN_COORDINATE_ACCESS_CODE:local-admin}"
  coordinate:
    vworld-fallback:
      enabled: false
  ingest:
    rtms:
      enabled: false
      mode: one-shot
      lawd-cd: ""
      deal-ymd: ""
      page-no: 1
      lookback-months: 0
      refresh-retry-attempts: 3
      refresh-retry-backoff-millis: 250
      preflight-only: false
      daily:
        enabled: false
        lawd-cds: ""
        lookback-months: 1
        cron: "0 15 5 * * *"
        zone: Asia/Seoul
        hermes:
          enabled: false
          url: "${HERMES_SLACK_URL:}"
          auth-token: "${HERMES_AUTH_TOKEN:}"
          channel: "${HERMES_SLACK_CHANNEL:}"
          connect-timeout-millis: 3000
          read-timeout-millis: 3000
