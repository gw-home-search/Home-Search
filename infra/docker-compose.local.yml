name: home-search-local

services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: home-search-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${HOME_SEARCH_DB_NAME:-home_search}
      POSTGRES_USER: ${HOME_SEARCH_DB_USERNAME:-home_search}
      POSTGRES_PASSWORD: ${HOME_SEARCH_DB_PASSWORD:-home_search_local_password}
    ports:
      - "${HOME_SEARCH_DB_PORT:-15432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - home-search-postgis-data:/var/lib/postgresql/data
    networks:
      - home-search-local

  redis:
    image: redis:7.4-alpine
    container_name: home-search-redis
    restart: unless-stopped
    ports:
      - "${HOME_SEARCH_REDIS_PORT:-16379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - home-search-local

  api:
    image: eclipse-temurin:17-jdk
    container_name: home-search-api
    restart: unless-stopped
    depends_on:
      postgis:
        condition: service_healthy
    working_dir: /workspace/apps/api
    command: [ "./gradlew", "bootRun", "--no-daemon" ]
    env_file:
      - ../apps/api/ops/local-runtime.env.example
      - ${HOME_SEARCH_API_ENV_FILE:-../apps/api/ops/local-runtime.override.env.example}
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_JDBC_URL: jdbc:postgresql://postgis:5432/${HOME_SEARCH_DB_NAME:-home_search}
      DB_USERNAME: ${HOME_SEARCH_DB_USERNAME:-home_search}
      DB_PASSWORD: ${HOME_SEARCH_DB_PASSWORD:-home_search_local_password}
      COORDINATE_SOURCE_DB_JDBC_URL: jdbc:postgresql://postgis:5432/${COORDINATE_SOURCE_DB_NAME:-home_search_coordinate_full_durable_20260527182147}
      COORDINATE_SOURCE_DB_USERNAME: ${COORDINATE_SOURCE_DB_USERNAME:-${HOME_SEARCH_DB_USERNAME:-home_search}}
      COORDINATE_SOURCE_DB_PASSWORD: ${COORDINATE_SOURCE_DB_PASSWORD:-${HOME_SEARCH_DB_PASSWORD:-home_search_local_password}}
      COORDINATE_SOURCE_DB_CONNECT_TIMEOUT_SECONDS: ${COORDINATE_SOURCE_DB_CONNECT_TIMEOUT_SECONDS:-5}
      COORDINATE_SOURCE_DB_SOCKET_TIMEOUT_SECONDS: ${COORDINATE_SOURCE_DB_SOCKET_TIMEOUT_SECONDS:-10}
      COORDINATE_SOURCE_DB_LOCK_TIMEOUT_MILLIS: ${COORDINATE_SOURCE_DB_LOCK_TIMEOUT_MILLIS:-1000}
      COORDINATE_SOURCE_DB_STATEMENT_TIMEOUT_MILLIS: ${COORDINATE_SOURCE_DB_STATEMENT_TIMEOUT_MILLIS:-3000}
      COORDINATE_SOURCE_DB_READ_ONLY: ${COORDINATE_SOURCE_DB_READ_ONLY:-true}
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration/api
      SPRING_FLYWAY_IGNORE_MIGRATION_PATTERNS: ${SPRING_FLYWAY_IGNORE_MIGRATION_PATTERNS:-*:missing}
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:-false}
      HOME_INGEST_RTMS_ENABLED: ${HOME_INGEST_RTMS_ENABLED:-false}
      HOME_INGEST_RTMS_MODE: ${HOME_INGEST_RTMS_MODE:-one-shot}
      HOME_INGEST_RTMS_ALLOW_COORDINATE_PENDING_ONLY: ${HOME_INGEST_RTMS_ALLOW_COORDINATE_PENDING_ONLY:-false}
      HOME_MAP_MARKER_CACHE_ENABLED: ${HOME_MAP_MARKER_CACHE_ENABLED:-false}
      HOME_MAP_MARKER_CACHE_TTL: ${HOME_MAP_MARKER_CACHE_TTL:-5m}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SERVER_PORT: "8080"
    ports:
      - "${HOME_SEARCH_API_PORT:-8080}:8080"
    volumes:
      - ..:/workspace
      - home-search-gradle-cache:/root/.gradle
    networks:
      - home-search-local

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: home-search-prometheus
    restart: unless-stopped
    depends_on:
      - api
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "127.0.0.1:${HOME_SEARCH_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - home-search-prometheus-data:/prometheus
    networks:
      - home-search-local

  loki:
    image: grafana/loki:3.7.0
    container_name: home-search-loki
    restart: unless-stopped
    command:
      - "-config.file=/etc/loki/local-config.yml"
    ports:
      - "127.0.0.1:${HOME_SEARCH_LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki.local.yml:/etc/loki/local-config.yml:ro
      - home-search-loki-data:/loki
    networks:
      - home-search-local

  alloy:
    image: grafana/alloy:${HOME_SEARCH_ALLOY_IMAGE_TAG:-v${HOME_SEARCH_ALLOY_VERSION:-1.16.3}}
    container_name: home-search-alloy
    restart: unless-stopped
    depends_on:
      - loki
    command:
      - "run"
      - "/etc/alloy/config.alloy"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
    ports:
      - "127.0.0.1:${HOME_SEARCH_ALLOY_PORT:-12345}:12345"
    volumes:
      - ./alloy.local.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - home-search-alloy-data:/var/lib/alloy/data
    networks:
      - home-search-local

  grafana:
    image: grafana/grafana:13.0.2
    container_name: home-search-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${HOME_SEARCH_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${HOME_SEARCH_GRAFANA_ADMIN_PASSWORD:-home_search_local_admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: ${HOME_SEARCH_GRAFANA_ANONYMOUS_ENABLED:-false}
    ports:
      - "127.0.0.1:${HOME_SEARCH_GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - home-search-grafana-data:/var/lib/grafana
    networks:
      - home-search-local

  web:
    image: node:22-bookworm-slim
    container_name: home-search-web
    restart: unless-stopped
    depends_on:
      - api
    working_dir: /workspace/apps/web
    command: [ "sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0 --port 5173" ]
    environment:
      VITE_API_SERVER_IP: ${VITE_API_SERVER_IP:-http://localhost:8080}
    ports:
      - "${HOME_SEARCH_WEB_PORT:-5173}:5173"
    volumes:
      - ..:/workspace
      - home-search-web-node-modules:/workspace/apps/web/node_modules
    networks:
      - home-search-local

volumes:
  home-search-postgis-data:
  home-search-gradle-cache:
  home-search-prometheus-data:
  home-search-loki-data:
  home-search-alloy-data:
  home-search-grafana-data:
  home-search-web-node-modules:

networks:
  home-search-local:
